<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ekstrakurikuler Sekolah</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #1b5e20;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h2 {
            margin-top: 0;
            color: #2e7d32;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<header>
    <h1>Ekstrakurikuler Sekolah</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Daftar Ekskul</a>
    <a href="#">Tentang</a>
    <a href="#">Kontak</a>
</nav>

<div class="container">

    <div class="card">
        <img src="Futsal.jpg" alt="Futsal">
        <div class="card-content">
            <h2>Futsal</h2>
            <p>Eskul nya ilham.</p>
        </div>
    </div>



    <div class="card">
        <img src="Paskib.jpg" alt="Paskibra">
        <div class="card-content">
            <h2>Paskibra</h2>
            <p>Eskulnya Daka.</p>
        </div>
    </div>

    <div class="card">
        <img src="Bultang.jpg" alt="Badminton">
        <div class="card-content">
            <h2>Badminton</h2>
            <p>Eskulnya deco.</p>
        </div>
    </div>

</div>

<footer>
    <p>© 2026 Halaman Ekskul | Dibuat oleh Deco</p>
</footer>

</body>
</html>
